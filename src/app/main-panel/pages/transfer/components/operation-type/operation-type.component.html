<nav class="container">
  <div class="row">
    @for (item of operationItems; track $index) {
      <button
        type="button"
        class="btn col mx-1"
        [routerLink]="item.operation"
        routerLinkActive="active"
        #rla="routerLinkActive"
        [disabled]="rla.isActive"
      >
        <mat-icon>{{item.icon}}</mat-icon>
        {{item.label|translate}}
      </button>
    }
  </div>
</nav>
