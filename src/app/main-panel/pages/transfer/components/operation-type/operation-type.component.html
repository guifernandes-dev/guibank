<nav class="d-flex justify-content-between gap-2">
  @for (item of operationItems; track $index) {
    <button
      type="button"
      class="btn"
      [routerLink]="item.operation"
      routerLinkActive="active"
      #rla="routerLinkActive"
      [disabled]="rla.isActive"
    >
      <mat-icon>{{item.icon}}</mat-icon>
      {{item.label}}
    </button>
  }
</nav>
