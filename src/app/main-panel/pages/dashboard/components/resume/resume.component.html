<div class="container w-100 gap-2">
  <div class="row justify-content-between">
    <mat-card appearance="outlined" class="col mx-2">
      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title class="card-title">SALDO</mat-card-title>
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content [class]="`card-resume 
        ${saldo > 0 ? 'text-success' : 'text-danger'} 
        ${hidden() ? '' : 'blur'}
      `">
        {{ hidden() ? (saldo | brCurrency) : 'R$ *****'}}
      </mat-card-content>
    </mat-card>
    <mat-card appearance="outlined" class="col mx-2">
      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title class="card-title">ENTRADAS</mat-card-title>
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content [class]="`card-resume text-success ${hidden() ? '' : 'blur'}`">
        {{ hidden() ? (receitas | brCurrency) : 'R$ *****'}}
      </mat-card-content>
    </mat-card>
    <mat-card appearance="outlined" class="col mx-2">
      <mat-card-header>
        <mat-card-title-group>
          <mat-card-title class="card-title">SAÍDAS</mat-card-title>
        </mat-card-title-group>
      </mat-card-header>
      <mat-card-content [class]="`card-resume text-danger ${hidden() ? '' : 'blur'}`">
        {{ hidden() ? (despesas | brCurrency) : 'R$ *****'}}
      </mat-card-content>
    </mat-card>

  </div>
</div>
