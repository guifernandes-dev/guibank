<div class="d-flex w-100 justify-content-evenly gap-2">
  @if (limiteDisp === 0) {
    <mat-card appearance="outlined" class="no-limit-container">
      <mat-card-content class="card-resume">
        <mat-card-title class="card-title">NÃO HÁ LIMITE DISPONÍVEL PARA NOVOS EMPRÉSTIMOS</mat-card-title>
      </mat-card-content>
    </mat-card>
  }
  <mat-card
    appearance="outlined"
    matTooltip="Saldo devedor considera o total com juros se não houver antecipação"
  >
    <mat-card-header>
      <mat-card-title-group>
        <mat-card-title class="card-title">SALDO DEVEDOR TOTAL</mat-card-title>
      </mat-card-title-group>
    </mat-card-header>
    <mat-card-content class="card-resume-valor">
      {{ valorEmprestimos | brCurrency}}
    </mat-card-content>
  </mat-card>
  @if (limiteDisp > (vrParcelaMin * (1 + tax()))) {
    <button
      mat-fab
      extended
      class="mt-3"
      class="btn-padrao w-75"
      type="button"
      routerLink="simular"
    >
      <mat-icon>add</mat-icon>
      SOLICITAR EMPRÉSTIMO
    </button>
  }
  <app-loan-list/>
</div>
