<h2 mat-dialog-title>
  {{'DIALOGS.PAY.TITLE'|translate}}
</h2>
<mat-dialog-content>
  <p>
    {{'DIALOGS.DOCUMENT.PAY.CONTENT'|translate}} {{trans.descricao}}?
  </p>
  <h4>{{trans.valor | brCurrency : lang}}</h4>
</mat-dialog-content>
<mat-dialog-actions>
  <button mat-button (click)="pagar()" cdkFocusInitial>
    {{'DIALOGS.PAY.NOW'|translate}}
  </button>
  <button mat-button (click)="fechar()">
    {{'DIALOGS.PAY.CANCEL'|translate}}
  </button>
</mat-dialog-actions>
